services:
  - type: web
    name: CO-ADMIN-V2
    plan: free
    runtime: python-3.11.9
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OWNER_IDS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 10000
