services:
  - type: web
    name: CO-ADMIN-V2
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OWNER_IDS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 10000
- type: web
    name: CO-ADMIN-V2
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
        envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OWNER_IDS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 10000
