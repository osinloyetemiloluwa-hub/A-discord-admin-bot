services:
  - type: web
    name: discord-co-admin-bot
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OWNER_IDS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 10000
