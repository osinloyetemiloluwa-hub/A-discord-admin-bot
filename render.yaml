services:
  - type: web
    name: a-co-admin-bot
    runtime: python
    pythonVersion: "3.11.9"
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OWNER_IDS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 10000
